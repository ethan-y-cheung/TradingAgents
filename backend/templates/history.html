<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis History - TradingAgents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .nav {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .ticker-accordion {
            margin-bottom: 15px;
        }

        .ticker-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .ticker-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .ticker-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ticker-symbol {
            font-size: 1.8em;
            font-weight: bold;
        }

        .ticker-count {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .ticker-arrow {
            font-size: 1.5em;
            transition: transform 0.3s;
        }

        .ticker-accordion.expanded .ticker-arrow {
            transform: rotate(180deg);
        }

        .ticker-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 20px;
        }

        .ticker-accordion.expanded .ticker-content {
            max-height: 2000px;
            padding: 20px;
        }

        .analysis-list {
            display: grid;
            gap: 12px;
            margin-top: 10px;
        }

        .analysis-item {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .analysis-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .analysis-date {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .decision-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .decision-buy {
            background: #4caf50;
            color: white;
        }

        .decision-sell {
            background: #f44336;
            color: white;
        }

        .decision-hold {
            background: #ff9800;
            color: white;
        }

        .decision-unknown {
            background: #9e9e9e;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-box {
            flex: 1;
            min-width: 150px;
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Analysis History</h1>
            <p>View and explore past trading analyses</p>
            
            <div class="stats-bar" id="statsBar"></div>
        </div>

        <div class="nav">
            <a href="/">← Back to Dashboard</a>
        </div>

        <div class="card">
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by ticker...">
                </div>
            </div>

            <div id="resultsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading analysis history...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let allResults = {};

        // Load results on page load
        window.addEventListener('DOMContentLoaded', loadResults);

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = {};
            
            for (const [ticker, analyses] of Object.entries(allResults)) {
                if (ticker.toLowerCase().includes(searchTerm)) {
                    filtered[ticker] = analyses;
                }
            }
            
            displayResults(filtered);
        });

        async function loadResults() {
            try {
                const response = await fetch(`${API_URL}/results`);
                const data = await response.json();
                allResults = data.results;
                displayResults(allResults);
                displayStats(allResults);
            } catch (error) {
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Error Loading Results</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function displayStats(results) {
            const tickers = Object.keys(results).length;
            let totalAnalyses = 0;
            let buyCount = 0;
            let sellCount = 0;
            let holdCount = 0;

            for (const analyses of Object.values(results)) {
                totalAnalyses += analyses.length;
                for (const analysis of analyses) {
                    if (analysis.decision === 'BUY') buyCount++;
                    else if (analysis.decision === 'SELL') sellCount++;
                    else if (analysis.decision === 'HOLD') holdCount++;
                }
            }

            document.getElementById('statsBar').innerHTML = `
                <div class="stat-box">
                    <div class="stat-value">${tickers}</div>
                    <div class="stat-label">Tickers</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${totalAnalyses}</div>
                    <div class="stat-label">Total Analyses</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${buyCount}</div>
                    <div class="stat-label">Buy Signals</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${sellCount}</div>
                    <div class="stat-label">Sell Signals</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${holdCount}</div>
                    <div class="stat-label">Hold Signals</div>
                </div>
            `;
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            
            const tickers = Object.keys(results);
            if (tickers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No Results Found</h3>
                        <p>No analyses found in eval_results folder.</p>
                    </div>
                `;
                return;
            }

            // Sort tickers alphabetically
            tickers.sort();

            container.innerHTML = tickers.map(ticker => createTickerAccordion(ticker, results[ticker])).join('');

            // Add click handlers for accordions
            document.querySelectorAll('.ticker-header').forEach(header => {
                header.addEventListener('click', () => {
                    const accordion = header.parentElement;
                    accordion.classList.toggle('expanded');
                });
            });

            // Add click handlers for analysis items
            document.querySelectorAll('.analysis-item').forEach(item => {
                item.addEventListener('click', () => {
                    const ticker = item.dataset.ticker;
                    const date = item.dataset.date;
                    window.location.href = `/analysis?ticker=${ticker}&date=${date}`;
                });
            });
        }

        function createTickerAccordion(ticker, analyses) {
            return `
                <div class="ticker-accordion">
                    <div class="ticker-header">
                        <div class="ticker-header-left">
                            <div class="ticker-symbol">${ticker}</div>
                            <div class="ticker-count">${analyses.length} ${analyses.length === 1 ? 'analysis' : 'analyses'}</div>
                        </div>
                        <div class="ticker-arrow">▼</div>
                    </div>
                    <div class="ticker-content">
                        <div class="analysis-list">
                            ${analyses.map(analysis => createAnalysisItem(ticker, analysis)).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function createAnalysisItem(ticker, analysis) {
            const decision = analysis.decision.toUpperCase();
            const decisionClass = `decision-${decision.toLowerCase()}`;

            return `
                <div class="analysis-item" data-ticker="${ticker}" data-date="${analysis.date}">
                    <div class="analysis-date">📅 ${analysis.date}</div>
                    <div class="decision-badge ${decisionClass}">${decision}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
